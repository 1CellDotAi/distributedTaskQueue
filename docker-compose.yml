services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: taskq
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskq"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20
    volumes:
      - redisdata:/data

  api:
    build:
      context: .
      args:
        BIN: api
    environment:
      DATABASE_URL: "host=postgres port=5432 user=postgres dbname=taskq sslmode=disable"
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_URL: "redis://redis:6379/0"
      HTTP_ADDR: ":8080"
    ports: ["8080:8080"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  worker:
    build:
      context: .
      args:
        BIN: worker
    environment:
      DATABASE_URL: "host=postgres port=5432 user=postgres dbname=taskq sslmode=disable"
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_URL: "redis://redis:6379/0"
      WORKER_CONCURRENCY: "8"
      TASK_TYPES: "echo,sleep,flaky,email"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    deploy:
      replicas: 3

  scheduler:
    build:
      context: .
      args:
        BIN: scheduler
    environment:
      DATABASE_URL: "host=postgres port=5432 user=postgres dbname=taskq sslmode=disable"
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  dashboard:
    build:
      context: ./web
    environment:
      VITE_API_URL: "http://localhost:8080"
    ports: ["5173:80"]
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
